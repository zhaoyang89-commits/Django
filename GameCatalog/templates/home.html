{% extends 'base.html' %}
{% block content %}
<div class="hero">
    <h1>Game Catalog</h1>
    <p>
        Browse games, compare genres and discover new titles.
    </p>
    <a class="btn" href="/games/">
        View All Games
    </a>
</div>

<h2>Latest Games</h2>

<div class="game-grid">
    {% for game in latest_games %}
    <div class="game-card">
        <img
            src="{{ game.cover_image.url }}"
            alt="{{ game.title }}"
        >
        <div class="game-content">
            <h3>{{ game.title }}</h3>
            <p>
                Genre: {{ game.genre }}
            </p>
            <p>
                Rating: {{ game.rating }}
            </p>
            <a
                class="btn"
                href="/games/{{ game.id }}/"
            >
                Details
            </a>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
